name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2
        shell: pwsh
        run: |
          choco install msys2 -y --no-progress

      - name: Update MSYS2
        shell: pwsh
        run: |
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -Sy"
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -Syu"

      - name: Install dependencies
        shell: pwsh
        run: |
          C:\tools\msys64\usr\bin\bash.exe -lc "
            pacman --noconfirm -S --needed \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-ninja \
            mingw-w64-x86_64-qt6-base \
            mingw-w64-x86_64-qt6-tools \
            mingw-w64-x86_64-qt6-speech
          "

      - name: Configure
        shell: pwsh
        run: |
          C:\tools\msys64\usr\bin\bash.exe -lc "
            export PATH=/mingw64/bin:\$PATH
            cd '$env:GITHUB_WORKSPACE'
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          "

      - name: Build
        shell: pwsh
        run: |
          C:\tools\msys64\usr\bin\bash.exe -lc "
            export PATH=/mingw64/bin:\$PATH
            cd '$env:GITHUB_WORKSPACE'
            cmake --build build --parallel
          "

      - name: Deploy
        shell: pwsh
        run: |
          C:\tools\msys64\usr\bin\bash.exe -lc "
            export PATH=/mingw64/bin:\$PATH
            cd '$env:GITHUB_WORKSPACE'

            mkdir -p dist

            cp build/aurudinha_game.exe dist/

            windeployqt \
              --release \
              --dir dist \
              dist/aurudinha_game.exe

            if [ -d assets ]; then
              cp -r assets dist/assets
            fi
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurudinha-windows
          path: dist
