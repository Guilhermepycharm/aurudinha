name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-qt6-speech
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-ntldd

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/ucrt64/lib/cmake/Qt6

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: |
          set +e
          mkdir deploy
          cp build/aurudinha_game.exe deploy/
          cp -r assets deploy/
          cp -r config deploy/

          windeployqt \
            --release \
            --no-translations \
            --no-opengl-sw \
            deploy/aurudinha_game.exe || true

          # Copy MinGW runtime DLLs
          cp /ucrt64/bin/libgcc_s_seh-1.dll deploy/ 2>/dev/null
          cp /ucrt64/bin/libstdc++-6.dll deploy/ 2>/dev/null
          cp /ucrt64/bin/libwinpthread-1.dll deploy/ 2>/dev/null
          cp /ucrt64/bin/D3Dcompiler_47.dll deploy/ 2>/dev/null

          # Copy Qt indirect dependency DLLs (not caught by windeployqt)
          for dll in libb2-1.dll libdouble-conversion.dll libicuin78.dll libicuuc78.dll \
                    libicudt78.dll libpcre2-16-0.dll zlib1.dll libzstd.dll libfreetype-6.dll \
                    libharfbuzz-0.dll libmd4c.dll libpng16-16.dll libbrotlidec.dll \
                    libbz2-1.dll libglib-2.0-0.dll libgraphite2.dll; do
            find /ucrt64 -name "$dll" -exec cp -n {} deploy/ \; 2>/dev/null
          done

          # Resolve remaining transitive DLL dependencies iteratively
          for i in 1 2 3; do
            find deploy/ \( -name '*.dll' -o -name '*.exe' \) | while read f; do
              ntldd -R "$f" 2>/dev/null \
                | grep -oP '/ucrt64/\S+/\K[^\s]+' \
                | sort -u \
                | while read dll; do
                    find /ucrt64 -name "$dll" -exec cp -n {} deploy/ \; 2>/dev/null
                  done
            done
          done

          echo "=== Checking for missing DLLs ==="
          missing=$(ntldd -R deploy/aurudinha_game.exe 2>/dev/null | grep -i "not found" | wc -l)
          if [ "$missing" -gt 0 ]; then
            echo "WARNING: $missing DLL(s) still missing:"
            ntldd -R deploy/aurudinha_game.exe 2>/dev/null | grep -i "not found"
          else
            echo "All DLL dependencies resolved."
          fi

          echo "=== DLLs in deploy ==="
          ls -la deploy/*.dll

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}\deploy\*" -DestinationPath "${{ github.workspace }}\aurudinha-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurudinha-windows
          path: aurudinha-windows.zip
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          files: aurudinha-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
