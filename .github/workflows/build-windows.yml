name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-qt6-speech
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-ntldd

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/ucrt64/lib/cmake/Qt6

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: |
          mkdir deploy
          cp build/aurudinha_game.exe deploy/
          cp -r assets deploy/
          cp -r config deploy/

          # windeployqt fails in MSYS2 UCRT64 (missing catalogs.json, DirectX DLLs).
          # Use --skip-library-deploy and resolve DLLs manually via ntldd below.
          windeployqt \
            --release \
            --no-translations \
            --no-opengl-sw \
            --skip-library-deploy \
            deploy/aurudinha_game.exe || true

          # Copy MinGW runtime DLLs
          cp /ucrt64/bin/libgcc_s_seh-1.dll deploy/
          cp /ucrt64/bin/libstdc++-6.dll deploy/
          cp /ucrt64/bin/libwinpthread-1.dll deploy/

          # Auto-detect and copy all remaining DLL dependencies via ntldd
          find deploy/ \( -name '*.dll' -o -name '*.exe' \) | while read f; do
            ntldd -R "$f" 2>/dev/null \
              | grep -oP '/ucrt64/bin/\K\S+' \
              | sort -u \
              | while read dll; do
                  [ -f "/ucrt64/bin/$dll" ] && cp -n "/ucrt64/bin/$dll" deploy/
                done
          done

          # Verify no missing dependencies remain
          echo "=== Checking for missing DLLs ==="
          ntldd -R deploy/aurudinha_game.exe 2>/dev/null \
            | grep -i "not found" \
            && echo "WARNING: Some DLLs are still missing!" \
            || echo "All DLL dependencies resolved."

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}\deploy\*" -DestinationPath "${{ github.workspace }}\aurudinha-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurudinha-windows
          path: aurudinha-windows.zip
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          files: aurudinha-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
