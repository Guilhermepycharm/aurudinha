name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows MinGW Qt build
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 and Qt
        shell: pwsh
        run: |
          choco install msys2 --no-progress -y
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -Syuu"
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -S --needed mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-qt6-base mingw-w64-x86_64-qt6-speech"

      - name: Configure CMake
        run: |
          export PATH=/mingw64/bin:$PATH
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          export PATH=/mingw64/bin:$PATH
          cmake --build build --config Release

      - name: Deploy Qt runtime
        run: |
          export PATH=/mingw64/bin:$PATH
          mkdir -p dist
          cp build/aurudinha_game.exe dist/
          windeployqt --release --dir dist dist/aurudinha_game.exe
          if [ -d assets ]; then cp -r assets dist/assets; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurudinha-windows
          path: dist
