name: Build Windows
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: pwsh
        run: |
          choco install qt6 ninja -y
          mkdir build
          cd build
          cmake -G "Ninja" .. -DCMAKE_PREFIX_PATH="C:\Qt\6.5.3\mingw_64"
          cmake --build .
          & "C:\Qt\6.5.3\mingw_64\bin\windeployqt.exe" --dir dist aurudinha_game.exe
          Copy-Item ../aurudinha_game.exe -Destination dist\
          if (Test-Path "../assets") { Copy-Item -Recurse "../assets" -Destination "dist\assets" }
      - uses: actions/upload-artifact@v4
        with:
          name: Aurudinha-Build
          path: build/dist/
