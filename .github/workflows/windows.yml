name: Build Windows Executable

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: pwsh
        run: |
          # Instalação simplificada via CMake/vcpkg (nativo do GitHub)
          mkdir build
          cd build
          cmake -G "Ninja" ..
          cmake --build .
          windeployqt --dir dist aurudinha_game.exe
          Copy-Item aurudinha_game.exe -Destination dist\
          if (Test-Path "../assets") { Copy-Item -Recurse "../assets" -Destination "dist\assets" }
      - uses: actions/upload-artifact@v4
        with:
          name: Aurudinha-Windows
          path: build/dist/
