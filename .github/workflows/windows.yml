name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtspeech'
          setup-python: 'false'

      - name: Install Ninja
        run: choco install ninja

      - name: Configure and Build
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake -G "Ninja" .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Package with windeployqt
        shell: pwsh
        run: |
          $qt_bin = "$env:Qt6_DIR/bin"
          cd build
          & "$qt_bin/windeployqt.exe" --cpp vn_app.exe --dir dist
          
          # Copiar o executável para a pasta final
          copy vn_app.exe dist/
          
          # Garantir que a pasta assets vá junto
          if (Test-Path "../assets") {
            xcopy /E /I ../assets dist/assets
          }
          
          # Verificar se as DLLs de runtime do MinGW são necessárias
          # O windeployqt geralmente não copia o libgcc/libstdc++, mas o install-qt-action coloca no PATH
          # Vamos tentar copiar as essenciais se encontrarmos no PATH
          $mingw_bin = (Get-Command g++.exe).Source | Split-Path
          copy "$mingw_bin/libgcc_s_seh-1.dll" dist/ -ErrorAction SilentlyContinue
          copy "$mingw_bin/libstdc++-6.dll" dist/ -ErrorAction SilentlyContinue
          copy "$mingw_bin/libwinpthread-1.dll" dist/ -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visual-Novel-Windows
          path: build/dist/
