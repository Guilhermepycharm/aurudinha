name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows MinGW Qt build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-speech
            mingw-w64-x86_64-qt6-tools

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: msys2 {0}
        run: |
          cmake --build build --parallel

      - name: Deploy Qt runtime
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/aurudinha_game.exe dist/
          windeployqt --release --dir dist dist/aurudinha_game.exe
          if [ -d assets ]; then cp -r assets dist/assets; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurudinha-windows
          path: dist
