name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtspeech'
          setup-python: 'false'

      - name: Install Ninja
        run: choco install ninja

      - name: Configure and Build
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake -G "Ninja" .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Package with windeployqt
        shell: pwsh
        run: |
          cd build
          # Criar pasta dist primeiro para evitar erro de diretório inválido
          New-Item -ItemType Directory -Force -Path dist
          
          # Rodar windeployqt sem a opção inválida --cpp
          # Ele vai copiar as DLLs do Qt para a pasta dist
          windeployqt --dir dist --no-translations --no-opengl-sw aurudinha_game.exe
          
          # Copiar o executável principal
          Copy-Item aurudinha_game.exe -Destination dist\
          
          # Copiar a pasta de assets (imagens)
          if (Test-Path "../assets") {
            xcopy /E /I /Y "..\assets" "dist\assets"
          }
          
          # Tentar pegar as DLLs do compilador que o windeployqt às vezes esquece
          $mingw_bin = (Get-Command g++.exe).Source | Split-Path
          Copy-Item "$mingw_bin\libgcc_s_seh-1.dll" -Destination dist\ -ErrorAction SilentlyContinue
          Copy-Item "$mingw_bin\libstdc++-6.dll" -Destination dist\ -ErrorAction SilentlyContinue
          Copy-Item "$mingw_bin\libwinpthread-1.dll" -Destination dist\ -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visual-Novel-Windows
          path: build/dist/
