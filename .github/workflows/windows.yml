name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtspeech'

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake -G "MinGW Makefiles" ..
          cmake --build .

      - name: Package with windeployqt
        shell: pwsh
        run: |
          cd build
          windeployqt --cpp vn_app.exe
          mkdir dist
          copy vn_app.exe dist\
          if (Test-Path "../assets") {
            xcopy /E /I ../assets dist/assets
          }
          # Move DLLs if they exist in the root of build
          Get-ChildItem *.dll | ForEach-Object { Copy-Item $_.FullName dist/ }
          if (Test-Path "platforms") { xcopy /E /I platforms dist/platforms }
          if (Test-Path "styles") { xcopy /E /I styles dist/styles }
          if (Test-Path "translations") { xcopy /E /I translations dist/translations }
          if (Test-Path "generic") { xcopy /E /I generic dist/generic }
          if (Test-Path "imageformats") { xcopy /E /I imageformats dist/imageformats }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visual-Novel-Windows
          path: build/dist/
